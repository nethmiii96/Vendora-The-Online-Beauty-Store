<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendora Beauty - Your Cart</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --pink:#e91e63; --rose:#f06292; --bg:#fff0f5; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Poppins',sans-serif; background:linear-gradient(135deg,var(--bg),#fdf4ff); color:#333; }
        .navbar { display:flex; align-items:center; justify-content:center; padding:20px; background:rgba(255,255,255,0.96); position:sticky; top:0; z-index:1000; box-shadow:0 4px 25px rgba(233,30,99,0.08); }
        .logo { font-family:'Playfair Display',serif; font-size:32px; font-weight:700; color:var(--pink); }
        .dashboard { padding:40px 80px; max-width:1200px; margin:0 auto; }
        .card { background:white; border-radius:24px; box-shadow:0 15px 45px rgba(233,30,99,0.1); padding:35px; }
        .card h2 { font-family:'Playfair Display',serif; font-size:32px; color:var(--pink); text-align:center; margin-bottom:25px; }
        .controls { margin-bottom:20px; display:flex; gap:10px; flex-wrap:wrap; }
        .select-btn { padding:10px 20px; background:var(--pink); color:white; border:none; border-radius:999px; cursor:pointer; font-weight:600; }
        #cart-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:25px; }
        .cart-item { background:white; border-radius:20px; padding:20px; box-shadow:0 10px 30px rgba(0,0,0,0.05); position:relative; }
        .cart-item:hover { box-shadow:0 18px 45px rgba(233,30,99,0.12); }
        .cart-item img { width:100%; height:180px; object-fit:cover; border-radius:16px; }
        .cart-details h3 { font-size:20px; margin:12px 0 8px; }
        .price-qty { display:flex; align-items:center; gap:15px; margin-top:12px; }
        .price { font-size:19px; font-weight:600; color:var(--pink); }
        .qty { display:flex; align-items:center; background:#fce4ec; border-radius:999px; padding:4px; }
        .qty button { width:36px; height:36px; border:none; background:white; color:var(--pink); font-size:20px; cursor:pointer; border-radius:50%; }
        .action-btns { margin-top:15px; display:flex; gap:12px; }
        .remove, .purchase-btn { flex:1; padding:12px; border:none; border-radius:999px; font-weight:600; cursor:pointer; }
        .remove { background:#e53935; color:white; }
        .purchase-btn { background:linear-gradient(90deg,var(--pink),var(--rose)); color:white; }
        .checkbox { position:absolute; top:15px; left:15px; width:20px; height:20px; accent-color:var(--pink); }
        #empty-message { text-align:center; padding:100px 20px; color:#777; font-size:20px; display:none; }
        .toast { position:fixed; bottom:40px; right:40px; background:linear-gradient(90deg,var(--pink),var(--rose)); color:white; padding:18px 32px; border-radius:999px; box-shadow:0 12px 35px rgba(233,30,99,0.4); display:none; z-index:9999; }
        .toast.show { display:block; }
    </style>
</head>
<body>
<nav class="navbar"><div class="logo">Vendora Beauty</div></nav>

<section class="dashboard">
    <div class="card">
        <h2>Your Cart</h2>
        <div class="controls">
            <button class="select-btn" onclick="toggleSelectMode()">Select Items</button>
            <div id="bulk-bar" style="display:none; gap:10px;">
                <button onclick="removeSelected()" style="background:#e53935; color:white; padding:10px 20px; border:none; border-radius:999px;">Remove Selected</button>
                <button onclick="purchaseSelected()" style="background:linear-gradient(90deg,var(--pink),var(--rose)); color:white; padding:10px 20px; border:none; border-radius:999px;">Purchase Selected</button>
            </div>
        </div>
        <div id="cart-grid"></div>
        <div id="empty-message">
            <h3>Your cart is empty 😔</h3>
            <p>Start adding beauty products!</p>
        </div>
        <button onclick="loadMore()" id="load-more-btn" style="display:none; margin:20px auto; padding:12px 30px; background:var(--pink); color:white; border:none; border-radius:999px; cursor:pointer;">View More Items</button>
    </div>
</section>

<div id="toast" class="toast"></div>

<!-- Summary Modal -->
<div id="summary-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000; justify-content:center; align-items:center;">
    <div style="background:white; padding:30px; border-radius:20px; max-width:500px; width:90%;">
        <h3>Purchase Summary</h3>
        <div id="modal-items" style="margin:15px 0;"></div>
        <div style="font-size:18px;">Delivery Fee: Rs. 500</div>
        <div id="modal-grand" style="font-size:22px; font-weight:700; color:var(--pink); text-align:right; margin-top:10px;"></div>
        <div style="margin-top:25px; text-align:center;">
            <button onclick="confirmPurchase()" style="background:linear-gradient(90deg,var(--pink),var(--rose)); color:white; border:none; padding:14px 40px; border-radius:999px; cursor:pointer;">Confirm & Pay</button>
            <button onclick="document.getElementById('summary-modal').style.display='none'" style="background:#ddd; color:#333; border:none; padding:14px 40px; border-radius:999px; cursor:pointer; margin-left:10px;">Cancel</button>
        </div>
    </div>
</div>

<script>
const API_BASE = 'http://localhost/vendora/backend/api/';
let cartItems = [];
let selectMode = false;
let displayedCount = 3;

// ==================== FETCH (Backend first → 4 dummy fallback) ====================
async function fetchCart() {
    try {
        const res = await fetch(API_BASE + 'cart/fetch.php');
        cartItems = await res.json();
        if (cartItems.length === 0) throw new Error("Empty cart");
    } catch (e) {
        // Your 4 dummy items (always shown if backend not ready)
        cartItems = [
            {id:1, name:"Viana Velvet Matte Lipstick", price:1290, quantity:1, img_url:"https://viana.lk/wp-content/uploads/2019/10/cremetouch-lipstick_web-image.jpg"},
            {id:2, name:"Viana HD Liquid Foundation", price:4550, quantity:1, img_url:"https://viana.lk/wp-content/uploads/2019/10/13-8.jpg"},
            {id:3, name:"Viana HD Lengthening Mascara", price:2750, quantity:1, img_url:"https://viana.lk/wp-content/uploads/2025/11/Lenghtening-mascara-2.jpg"},
            {id:4, name:"Viana Gel Nail Polish", price:960, quantity:1, img_url:"https://viana.lk/wp-content/uploads/2025/03/01.jpg"}
        ];
        showToast("Demo mode active (4 items loaded)");
    }
    renderCart();
}

// ==================== RENDER (shows 3 then 4 on "View More") ====================
function renderCart() {
    const grid = document.getElementById('cart-grid');
    const empty = document.getElementById('empty-message');
    grid.innerHTML = '';

    const toShow = cartItems.slice(0, displayedCount);

    if (toShow.length === 0) {
        empty.style.display = 'block';
        return;
    }
    empty.style.display = 'none';

    toShow.forEach(item => {
        const div = document.createElement('div');
        div.className = 'cart-item';
        div.dataset.id = item.id;
        div.innerHTML = `
            <input type="checkbox" class="checkbox" style="${selectMode ? 'display:block' : 'display:none'}" onchange="updateBulkBar()">
            <img src="${item.img_url}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/300x180/e91e63/fff?text=Product';">
            <div class="cart-details">
                <h3>${item.name}</h3>
                <div class="price-qty">
                    <span class="price">Rs. ${item.price * item.quantity}</span>
                    <div class="qty">
                        <button onclick="changeQty(this,-1)">-</button>
                        <span>${item.quantity}</span>
                        <button onclick="changeQty(this,1)">+</button>
                    </div>
                </div>
            </div>
            <div class="action-btns">
                <button class="purchase-btn" onclick="purchaseSingle(this)">Purchase</button>
                <button class="remove" onclick="removeItem(this)">Remove</button>
            </div>
        `;
        grid.appendChild(div);
    });

    document.getElementById('load-more-btn').style.display = (cartItems.length > displayedCount) ? 'block' : 'none';
}

// ==================== ALL OTHER FUNCTIONS (fully working) ====================
async function changeQty(btn, delta) {
    const card = btn.closest('.cart-item');
    const id = parseInt(card.dataset.id);
    const item = cartItems.find(i => i.id === id);
    const newQty = item.quantity + delta;
    if (newQty < 1) return;

    try {
        await fetch(API_BASE + 'cart/update.php', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id, quantity:newQty})});
    } catch(e){}
    item.quantity = newQty;
    renderCart();
}

async function removeItem(btn) {
    const id = parseInt(btn.closest('.cart-item').dataset.id);
    try {
        await fetch(API_BASE + 'cart/remove.php', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id})});
    } catch(e){}
    cartItems = cartItems.filter(i => i.id !== id);
    renderCart();
    showToast('Item removed');
}

function purchaseSingle(btn) {
    const id = parseInt(btn.closest('.cart-item').dataset.id);
    const item = cartItems.find(i => i.id === id);
    document.getElementById('modal-items').innerHTML = `<strong>${item.name}</strong> × ${item.quantity} = Rs. ${item.price*item.quantity}`;
    document.getElementById('modal-grand').innerText = `Rs. ${item.price*item.quantity + 500}`;
    document.getElementById('summary-modal').style.display = 'flex';
    window.isSinglePurchase = true;
    window.currentId = id;
}

async function confirmPurchase() {
    document.getElementById('summary-modal').style.display = 'none';
    let ids = window.isSinglePurchase ? [window.currentId] : [];
    if (!window.isSinglePurchase) {
        document.querySelectorAll('.checkbox:checked').forEach(cb => ids.push(parseInt(cb.closest('.cart-item').dataset.id)));
    }
    try {
        await fetch(API_BASE + 'cart/purchase.php', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ids})});
    } catch(e){}
    cartItems = cartItems.filter(i => !ids.includes(i.id));
    renderCart();
    showToast('Purchase confirmed! 🎉');
    window.isSinglePurchase = false;
}

function toggleSelectMode() { selectMode = !selectMode; renderCart(); document.getElementById('bulk-bar').style.display = selectMode ? 'flex' : 'none'; }
function updateBulkBar() { document.getElementById('bulk-bar').style.display = document.querySelectorAll('.checkbox:checked').length > 0 ? 'flex' : 'none'; }
function removeSelected() { document.querySelectorAll('.checkbox:checked').forEach(cb => removeItem(cb)); }
function purchaseSelected() {
    const checked = document.querySelectorAll('.checkbox:checked');
    if (!checked.length) return;
    let html = '', total = 0;
    checked.forEach(cb => {
        const id = parseInt(cb.closest('.cart-item').dataset.id);
        const item = cartItems.find(i => i.id === id);
        html += `<div><strong>${item.name}</strong> × ${item.quantity} = Rs. ${item.price*item.quantity}</div>`;
        total += item.price * item.quantity;
    });
    document.getElementById('modal-items').innerHTML = html;
    document.getElementById('modal-grand').innerText = `Rs. ${total + 500}`;
    document.getElementById('summary-modal').style.display = 'flex';
    window.isSinglePurchase = false;
}
function loadMore() { displayedCount += 3; renderCart(); }
function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

window.onload = fetchCart;
</script>
</body>
</html>
