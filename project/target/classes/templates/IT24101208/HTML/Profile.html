<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendora | My Profile</title>

    <link rel="stylesheet" href="../../../static/css/base.css">
    <link rel="stylesheet" href="../../../static/css/components.css">
    <link rel="stylesheet" href="../../../static/css/footer.css">
    <link rel="stylesheet" href="../../../static/css/form.css">
    <link rel="stylesheet" href="../../../static/css/header.css">
    <link rel="stylesheet" href="../../../static/css/layout.css">

    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed&family=Playfair+Display&display=swap" rel="stylesheet">
</head>

<body>

<!-- HEADER (optional include if you have one) -->
<header class="header">
    <h1>Vendora</h1>
    <nav>
        <span id="navUserName"></span>
        <button id="logoutBtn">Logout</button>
    </nav>
</header>

<!-- PROFILE SECTION -->
<section class="form-container">
    <h2>My Profile</h2>

    <form id="profileForm" class="card">

        <!-- PROFILE IMAGE -->
        <div style="text-align:center; margin-bottom:20px;">
            <img id="profilePreview" src="../images/user.png" alt="Profile Image"
                 style="width:120px; height:120px; border-radius:50%; object-fit:cover;">
            <br><br>
            <input type="file" id="profileImage" accept="image/*">
        </div>

        <!-- USER DETAILS -->
        <label for="profileName">Full Name</label>
        <input type="text" id="profileName" required>

        <label for="profileEmail">Email</label>
        <input type="email" id="profileEmail" required>

        <label for="profileRole">Role</label>
        <input type="text" id="profileRole" disabled>

        <button type="submit">Update Profile</button>
    </form>

    <!-- SUCCESS MESSAGE -->
    <div id="successMessage" class="card" style="display:none; text-align:center;"></div>
</section>

<script>
    document.addEventListener("DOMContentLoaded", () => {

        const user = JSON.parse(localStorage.getItem("loggedUser"));

        // Redirect if not logged in
        if (!user) {
            window.location.href = "login.html";
            return;
        }

        /* ===== NAVBAR NAME ===== */
        const navUserName = document.getElementById("navUserName");
        if (navUserName) {
            navUserName.textContent = `Hi, ${user.name}`;
        }

        /* ===== LOAD PROFILE DATA ===== */
        document.getElementById("profileName").value = user.name || "";
        document.getElementById("profileEmail").value = user.email || "";
        document.getElementById("profileRole").value = user.role || "";

        const preview = document.getElementById("profilePreview");

        if (user.image) {
            preview.src = user.image;
        }

        /* ===== IMAGE PREVIEW ===== */
        document.getElementById("profileImage").addEventListener("change", function () {
            const file = this.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                preview.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });

        /* ===== UPDATE PROFILE ===== */
        document.getElementById("profileForm").addEventListener("submit", function (e) {
            e.preventDefault();

            user.name = document.getElementById("profileName").value.trim();
            user.email = document.getElementById("profileEmail").value.trim();

            // Save image if updated
            const fileInput = document.getElementById("profileImage");
            if (fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    user.image = e.target.result;
                    saveUser();
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                saveUser();
            }

            function saveUser() {
                localStorage.setItem("loggedUser", JSON.stringify(user));

                const msg = document.getElementById("successMessage");
                msg.style.display = "block";
                msg.innerHTML = "<p>✅ Profile updated successfully!</p>";

                setTimeout(() => {
                    window.location.href = "index.html";
                }, 1500);
            }
        });

        /* ===== LOGOUT ===== */
        document.getElementById("logoutBtn").addEventListener("click", () => {
            localStorage.removeItem("loggedUser");
            window.location.href = "login.html";
        });

    });
</script>

</body>
</html>
